name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-macos:
    name: Test · macOS · Swift ${{ matrix.swift }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build-only: Swift Testing is unavailable on this toolchain.
          - os: macos-14
            xcode: "15.4"
            swift: "5.10"
            build_only: true
          # Build-only: the test deps need Swift 6.1 to compile.
          - os: macos-15
            xcode: "16.2"
            swift: "6.0"
            build_only: true
          - os: macos-15
            xcode: "16.4"
            swift: "6.1"
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode ${{ matrix.xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Build
        run: swift build
      - name: Test
        if: ${{ !matrix.build_only }}
        # Opt into the test-only dependencies (snapshot + property based).
        env:
          FLOW_SNAPSHOT_TESTING: "1"
          FLOW_PROPERTY_TESTING: "1"
        # Image snapshot suites are host-bound pixel comparisons.
        run: swift test --skip ImageSnapshots --skip ReadmeSnapshotTests

  test-simulator:
    name: Test · ${{ matrix.platform }} Simulator
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: iOS
          - platform: tvOS
          - platform: watchOS
          - platform: visionOS
            filter: "xrOS|visionOS"
    # Opt into the test-only dependencies (snapshot + property based).
    env:
      FLOW_SNAPSHOT_TESTING: "1"
      FLOW_PROPERTY_TESTING: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Resolve ${{ matrix.platform }} Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | jq -r '([.devices | to_entries[] | select(.key | test("${{ matrix.filter || matrix.platform }}"))] | sort_by(.key) | last | .value[0].udid) // empty')
          echo "UDID=$UDID" >> $GITHUB_ENV
      - name: Build for ${{ matrix.platform }} Simulator
        run: |
          xcodebuild build-for-testing \
            -scheme Flow \
            -destination "id=$UDID" \
            -skipMacroValidation
      - name: Test on ${{ matrix.platform }} Simulator
        run: |
          xcodebuild test-without-building \
            -scheme Flow \
            -destination "id=$UDID" \
            -skipMacroValidation

  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install linters
        run: brew install swift-format swiftlint
      - name: swift-format
        run: swift-format lint --strict --recursive Sources Tests
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

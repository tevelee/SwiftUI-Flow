name-template: "$RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    when:
      labels: ["feature", "enhancement"]
  - title: "🐛 Bug fixes"
    when:
      labels: ["fix", "bugfix", "bug"]
  - title: "🎨 Layout & rendering"
    when:
      labels: ["layout", "alignment", "distribution"]
  - title: "⚡ Performance"
    when:
      labels: ["performance"]
  - title: "🔒 Swift 6 / Sendable"
    when:
      labels: ["swift6", "sendable", "concurrency"]
  - title: "📚 Documentation"
    when:
      labels: ["documentation", "docs"]
  - title: "🧰 Maintenance"
    when:
      labels: ["chore", "ci", "dependencies", "maintenance"]
  - type: version-resolver
    semver-increment: major
    when:
      labels: ["major", "breaking-change"]
  - type: version-resolver
    semver-increment: minor
    when:
      labels: ["minor", "feature", "enhancement"]
  - type: version-resolver
    semver-increment: patch
    when:
      labels: ["patch", "fix", "bugfix", "bug", "documentation", "maintenance", "ci", "performance"]
  - type: pre-exclude
    when:
      labels: ["skip-changelog"]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  default: patch

autolabeler:
  - label: "ci"
    files:
      - ".github/**"
  - label: "dependencies"
    files:
      - "Package.swift"
      - "Package@swift-*.swift"
      - "Package.resolved"
  - label: "documentation"
    files:
      - "*.md"
      - "Sources/**/*.docc/**"
  - label: "enhancement"
    files:
      - "Sources/**"

template: |
  ## What's changed

  $CHANGES

  <!-- Individual commits are appended automatically by release.yml -->

  **Full Changelog**: https://github.com/tevelee/SwiftUI-Flow/compare/$PREVIOUS_TAG...$RESOLVED_VERSION

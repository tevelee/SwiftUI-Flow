name: /update-snapshots

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  issues: write
  pull-requests: write

jobs:
  trigger:
    name: Trigger snapshot update for PR
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/update-snapshots') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - id: init
        uses: ./.github/actions/slash-command-init

      - name: Dispatch update-snapshots workflow
        if: steps.init.outputs.is_fork != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-snapshots.yml',
              ref: '${{ steps.init.outputs.ref }}'
            });

      - name: Comment — fork PR limitation
        if: steps.init.outputs.is_fork == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ `/update-snapshots` can only run for branches in this repository, not for forks. A maintainer can trigger it manually from the Actions tab.'
            });

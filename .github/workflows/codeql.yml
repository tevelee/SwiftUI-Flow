name: CodeQL

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Package*.swift"
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Package*.swift"
      - ".github/workflows/**"
      - ".github/actions/**"
  schedule:
    - cron: '0 0 * * 1'  # weekly on Mondays
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"

  analyze:
    name: Analyze (swift)
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-xcode
        with:
          xcode-version: "26.4"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

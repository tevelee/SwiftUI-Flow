name: brew bundle
description: Caches and installs Homebrew packages declared in .github/Brewfile.

runs:
  using: composite
  steps:
    - name: Generate cache paths
      id: brew-paths
      shell: bash
      run: |
        prefix=$(brew --prefix)
        packages=$(grep '^brew ' .github/Brewfile | sed 's/brew "\(.*\)"/\1/')
        {
          echo "paths<<EOF"
          for pkg in $packages; do
            echo "$prefix/Cellar/$pkg"
            echo "$prefix/opt/$pkg"
            echo "$prefix/bin/$pkg"
          done
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Cache Homebrew packages
      id: brew-cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.brew-paths.outputs.paths }}
        # Invalidates when packages are added/removed; bump -v1 to force a version refresh.
        key: brew-bundle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/Brewfile') }}-v1

    - name: Install packages
      if: steps.brew-cache.outputs.cache-hit != 'true'
      shell: bash
      run: brew bundle install --file .github/Brewfile --no-upgrade

name: Greet new contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            👋 Thanks for your first pull request to SwiftUI-Flow, @${{ github.actor }}!

            A maintainer will review it shortly. While you wait, please make sure:
            - [ ] `swift test` passes locally (the deterministic suite; image snapshots are environment-sensitive — see CONTRIBUTING.md)
            - [ ] New public API has `///` doc comments
            - [ ] The PR has a label set (helps the automated release notes)

            See [CONTRIBUTING.md](https://github.com/tevelee/SwiftUI-Flow/blob/main/CONTRIBUTING.md) for the full guide.
          issue_message: |
            👋 Thanks for opening your first issue in SwiftUI-Flow, @${{ github.actor }}!

            A maintainer will take a look soon. To help us respond faster, please make sure your issue includes:
            - Swift version and platform (iOS / macOS / tvOS / watchOS / visionOS)
            - Which view is involved (`HFlow`, `VFlow`, or the `Layout`)
            - A minimal reproduction case

            For questions and discussion, consider [GitHub Discussions](https://github.com/tevelee/SwiftUI-Flow/discussions) instead.

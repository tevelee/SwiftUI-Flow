name: Lint auto-fix

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "Sources/**"
      - "Tests/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Apply swift-format and SwiftLint fixes
    # Forks don't have write access — skip silently; CI lint will catch issues.
    if: github.event.pull_request.head.repo.fork == false
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/brew-bundle

      - name: swift-format auto-fix
        run: swift-format format --recursive --in-place Sources Tests

      - name: SwiftLint auto-fix
        run: swiftlint --fix || true

      - uses: ./.github/actions/git-config-bot

      - name: Commit fixes
        id: commit
        run: |
          git add Sources Tests
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Apply swift-format and SwiftLint auto-fixes"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: steps.commit.outputs.changed == 'true'
        uses: ./.github/actions/pr-comment-upsert
        with:
          marker: '<!-- lint-autofix -->'
          body: |
            > [!NOTE]
            > **Lint auto-fix applied.** `swift-format` and `swiftlint --fix` found issues and committed corrections to this branch. Pull the latest commit before pushing further changes.

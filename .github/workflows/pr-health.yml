name: PR health checks

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  missing-tests:
    name: Missing tests check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Check for missing tests
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            // Changes to library sources (excluding docs and the bundled Example).
            const sourcesChanged = files.some(
              f => f.filename.startsWith('Sources/')
                && !f.filename.includes('.docc')
                && !f.filename.includes('/Example/')
            );
            const testsChanged = files.some(f => f.filename.startsWith('Tests/'));

            core.setOutput('needs_comment', String(sourcesChanged && !testsChanged));

      - if: steps.check.outputs.needs_comment == 'true'
        uses: ./.github/actions/pr-comment-upsert
        with:
          marker: '<!-- pr-missing-tests -->'
          body: |
            > [!NOTE]
            > **No test files were modified in this PR.** If existing tests cover the change that's fine — just something to double-check. See [CONTRIBUTING.md](https://github.com/tevelee/SwiftUI-Flow/blob/main/CONTRIBUTING.md#testing) for the testing guide.

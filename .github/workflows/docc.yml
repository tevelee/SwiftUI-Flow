name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "Sources/**"
      - "Package*.swift"
  pull_request:
    branches: [main]
    paths:
      - "Sources/**"
      - "Package*.swift"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build DocC
    runs-on: macos-26
    env:
      FLOW_DOCC: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/swift-build-env
        with:
          xcode-version: "26.4"

      - name: Resolve swift-docc-plugin
        run: swift package resolve

      - name: Build documentation
        run: |
          swift package \
            --allow-writing-to-directory .build/docs \
            generate-documentation \
            --target Flow \
            --output-path .build/docs \
            --transform-for-static-hosting \
            --hosting-base-path SwiftUI-Flow \
            --warnings-as-errors

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .build/docs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}documentation/flow
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

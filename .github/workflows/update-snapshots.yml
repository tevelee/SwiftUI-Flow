name: Update Snapshots

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Never interrupt a snapshot update mid-commit

jobs:
  update:
    name: Regenerate snapshot references
    runs-on: macos-26
    timeout-minutes: 20
    permissions:
      contents: write
    # Snapshot suites require the snapshot-testing dependency.
    env:
      FLOW_SNAPSHOT_TESTING: "1"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - uses: ./.github/actions/swift-build-env
        with:
          xcode-version: "26.4"

      - name: Build tests
        run: swift build --build-tests

      - name: Delete existing reference images
        run: find Tests/FlowTests/SnapshotTests/Image/__Snapshots__ -name "*.png" -delete

      - name: Record new snapshots
        run: |
          SNAPSHOT_TESTING_RECORD=all swift test --filter ImageSnapshots || true
          SNAPSHOT_TESTING_RECORD=all swift test --filter ReadmeSnapshotTests || true

      - name: Verify new snapshots pass
        run: |
          swift test --filter ImageSnapshots
          swift test --filter ReadmeSnapshotTests

      - uses: ./.github/actions/git-config-bot

      - name: Commit updated references
        run: |
          git add Tests/FlowTests/SnapshotTests/Image/__Snapshots__/
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Update snapshot references"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

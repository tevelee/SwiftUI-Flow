name: /ci

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  issues: write
  pull-requests: write

jobs:
  trigger:
    name: Trigger CI for PR
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ci') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - id: init
        uses: ./.github/actions/slash-command-init

      - name: Dispatch CI workflow
        if: steps.init.outputs.is_fork != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              ref: '${{ steps.init.outputs.ref }}'
            });

      - name: Comment — fork PR limitation
        if: steps.init.outputs.is_fork == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ `/ci` can only re-trigger CI for branches in this repository, not for forks. Please push a new commit to re-run CI, or a maintainer can trigger it manually.'
            });
